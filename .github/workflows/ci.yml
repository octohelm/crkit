name: ci

on:
  push:
    branches:
      - "main"
    tags:
      - "v*"

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6
      - uses: jdx/mise-action@v4
      - uses: dagger/dagger-for-github@v8.4.0
      - run: just dagger publish
        env:
          GH_USERNAME: ${{ github.actor }}
          GH_PASSWORD: ${{ secrets.GITHUB_TOKEN }}
